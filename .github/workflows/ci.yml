name: CI — Type Check & Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend-typecheck:
    name: Backend TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: Run TypeScript type check (backend)
        run: npx tsc --noEmit

  frontend-build:
    name: Frontend Next.js Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    env:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:5000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret-placeholder

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: Build Next.js app
        run: npm run build
